# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api

# 数据源配置
spring:
  profiles:
    active: dev
  application:
   name: short-link-platform
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/short-link?useSSL=false&serverTimezone=UTC
    username: root
    password: 1234
  data:
    redis:
      host: 192.168.106.130
      port: 6379
      password: 123321
      database: 1
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.liu.shortlinkplatform.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
logging:
  level:
    root: info

# 雪花算法配置
snowflake:
  worker-id: 1
  datacenter-id: 1

#短链接自定义配置
short-link:
  domain: http://localhost:8080/api
  cache:
    # 缓存前缀
    prefix: "short_link:"
    expire-seconds: 86400
  code:
    min-length: 6
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
