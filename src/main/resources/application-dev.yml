spring:
  profiles:
    active: dev
  #数据库配置
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/short-link?useSSL=false&serverTimezone=UTC
    username: root
    password: 1234
  #Redis配置
  data:
    redis:
      host: 192.168.106.130
      port: 6379
      password: 123321
      database: 1
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
#短链接缓存配置
short-link:
  cache:
    expire-seconds: 300

#日志级别设置
logging:
    level:
      com.liu.com.liu.shortlinkplatform: debug
      root: info
