spring:
  cloud:
    sentinel:
      # 关闭控制台（本地简单使用，无需部署控制台）
      enabled: true
      web-context-unify: false
  #数据库配置
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/short-link?useSSL=false&serverTimezone=UTC
    username: root
    password: 1234
  #Redis配置
  data:
    redis:
      host: 192.168.106.130
      port: 6379
      password: 123321
      database: 1
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    # 消息确认
    publisher-confirm-type: correlated
    publisher-returns: true
#短链接缓存配置
short-link:
  cache:
    expire-seconds: 300

#日志级别设置
logging:
    level:
      com.liu.shortlinkplatform: debug
      root: info
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      # 暴露所有监控端点
      exposure:
        include: '*'
  metrics:
    tags:
      # 给当前应用打个标记，方便Grafana识别
      application: short-link-platform
  prometheus:
    metrics:
      # 开启Prometheus格式指标
      export:
        enabled: true