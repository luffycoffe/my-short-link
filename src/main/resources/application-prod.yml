spring:
  profiles:
    active: prod
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/short-link?useSSL=false&serverTimezone=UTC
    username: root
    password: 1234
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connect-timeout: 30000
      idle-timeout: 600000
  data:
    redis:
      host: prod-redis
      port: 6379
      password: 123321
      database: 2
      lettuce:
        pool:
          max-active: 20
          max-idle: 5
          min-idle: 2
short-link:
  cache:
    expire-seconds: 86400
  domain: http://localhost:8080/api

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.liu.shortlinkplatform.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.liu.shortlinkplatform: INFO
    root: WARN
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 7
      total-size-cap: 1GB
